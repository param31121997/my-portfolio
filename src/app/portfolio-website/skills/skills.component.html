<div id="skills">
  <div class="container">
    <div class="section-heading">
      <span class="eyebrow">What I Work With</span>
      <h2 class="sub-title">Skills <span>&</span> Technologies</h2>
      <p class="section-sub">A snapshot of the languages, frameworks, and tools I use to design, build, and ship full-stack applications.</p>
    </div>

    <div class="skills-grid">
      <div class="skill-card" *ngFor="let group of skillGroups">
        <div class="skill-icon"><i [class]="group.icon"></i></div>
        <h3>{{ group.title }}</h3>
        <div class="skill-pills">
          <span class="skill-pill" *ngFor="let skill of group.skills">{{ skill }}</span>
        </div>
      </div>
    </div>

    <div class="core-competencies">
      <h4 class="block-label">Core Competencies</h4>
      <div class="pill-row">
        <span class="pill" *ngFor="let item of coreCompetencies">{{ item }}</span>
      </div>
    </div>
  </div>
</div>
